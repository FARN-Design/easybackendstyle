name: Deploy to WordPress.org
run-name: Release Uploaded to WordPress Marketplace.

on:
  release:
    types: [published]
jobs:
  publish-to-WordPress-Marketplace:
    name: Release New Version ${{  github.ref_name }} to WordPress Marketplace
    runs-on: ubuntu-latest
    env:
      MAIN_PLUGIN_FILE: easyBackendStyle.php
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - run: sed -i "s/.*Stable tag.*/Stable tag:\ ${{  github.ref_name }}/" README.txt
      - run: sed -i 's/.*Version.*/Version:\ ${{  github.ref_name }}/' ${{ env.MAIN_PLUGIN_FILE }}
      - name: Setup Composer Authentication
        run: composer config --global github-oauth.github.com ${{ secrets.FARN_CORE_TOKEN }}
      - name: Install dependencies
        run: composer install --no-dev --optimize-autoloader

      - name: Collect commit messages since previous tag
        id: commits
        shell: bash
        run: |
          if git describe --tags --abbrev=0 HEAD^ 2>/dev/null; then
            prev_tag=$(git describe --tags --abbrev=0 HEAD^)
          else
            prev_tag=$(git rev-list --max-parents=0 HEAD)
          fi
          
          git log --oneline --no-decorate --no-merges ${prev_tag}..HEAD > commits.txt || echo "" > commits.txt
          
          echo "messages<<EOF" >> "$GITHUB_OUTPUT"
          cat commits.txt >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Show commit messages (logs)
        shell: bash
        run: |
          echo "Commit messages since previous tag:"
          cat <<'COMMITS'
          ${{ steps.commits.outputs.messages }}

      # 2. Trigger your easy-changelog action specifically formatted for WP.org
      - name: Checkout Easy Changelog Action
        uses: actions/checkout@v3
        with:
          repository: FARN-Design/easy-changelog
          ref: main
          path: .github/actions/easy-changelog
          token: ${{ secrets.FARN_CORE_TOKEN }}

      - name: Update readme.txt with Easy Changelog
        uses: ./.github/actions/easy-changelog
        with:
          open-ai-api-key: ${{ secrets.OPENAI_API_KEY }}
          new-version: ${{ github.ref_name }}
          commit-messages: ${{ steps.commits.outputs.messages }}
          mode: 'wordpress_marketplace'
          readme-path: 'README.txt' # Note: Watch your capitalizations here

      # 3. Persist the modified version numbers and changelog back into your repository
      - name: Cleanup temporary files before PR
        run: |
          rm -f commits.txt
          rm -rf .github/actions

      - name: Create and Auto-Merge Pull Request to Sync Main
        id: cpr
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.FARN_CORE_TOKEN }}
          commit-message: "chore: sync release ${{ github.ref_name }} changelog and bumps [skip ci]"
          branch: sync-release-${{ github.ref_name }}
          title: "Chore: Sync Release ${{ github.ref_name }} to Main"
          body: |
            This PR syncs the version bumps and changelog generated during the release of ${{ github.ref_name }}.
            - Updated `README.txt`
            - Updated `${{ env.MAIN_PLUGIN_FILE }}`
          base: main
          delete-branch: true

      - name: Merge PR
        if: steps.cpr.outputs.pull-request-number
        run: gh pr merge "${{ steps.cpr.outputs.pull-request-number }}" --squash --delete-branch --admin
        env:
          GH_TOKEN: ${{ secrets.FARN_CORE_TOKEN }}

      - name: Remove Development Files
        run: |
          rm -rf .idea
          rm -rf tests
          rm -rf bin
          rm -rf blueprint.json
          rm -rf phpunit.*
          rm -rf scripts
          rm -rf package*
          rm -rf composer*

      - name: WordPress Plugin Deploy
        uses: 10up/action-wordpress-plugin-deploy@stable
        env:
          SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
          SVN_USERNAME: ${{ secrets.SVN_USERNAME }}